
<!DOCTYPE html>
<html>

<head>

<title>Zade Rover</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

#joystickContainer{
    width:300px;
    height:300px;
    background:#222;
    border-radius:50%;
    margin:40px auto;
    position:relative;
    touch-action:none;
}

#joystick{
    width:100px;
    height:100px;
    background:#3498db;
    border-radius:50%;
    position:absolute;
    left:100px;
    top:100px;
}

.info{
    font-size:20px;
    margin-top:20px;
}

#mapCanvas{
    background:#000;
    border:2px solid #555;
    border-radius:10px;
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#3498db;
    color:white;
}

</style>

</head>

<body>

<h1>Control Zade</h1>

<div id="joystickContainer">
    <div id="joystick"></div>
</div>

<div class="info">
    Drag joystick to move rover
</div>

<h2>Trajectory Map</h2>

<canvas id="mapCanvas" width="500" height="500"></canvas>

<br>

<button onclick="resetMap()">Reset Map</button>

<script>

// ================= JOYSTICK =================

const joy = document.getElementById("joystick");
const container = document.getElementById("joystickContainer");

let dragging = false;

const centerX = 150;
const centerY = 150;
const maxRadius = 100;

// ================= MAP =================

const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");

let roverX = 250;
let roverY = 250;

let theta = 0;

let lastTime = Date.now();

const scale = 0.05;

// Draw starting point
ctx.fillStyle = "lime";
ctx.fillRect(roverX, roverY, 3, 3);

// ================= SEND MOTOR COMMAND =================

function sendMotor(left, right)
{
    fetch(`/move?left=${left}&right=${right}`);

    updateTrajectory(left, right);
}

// ================= MOVE JOYSTICK =================

function moveJoystick(x, y)
{
    joy.style.left = (x - 50) + "px";
    joy.style.top  = (y - 50) + "px";
}

// ================= TRAJECTORY =================

function updateTrajectory(left, right)
{
    const now = Date.now();

    let dt = (now - lastTime) / 1000.0;

    lastTime = now;

    // Normalize
    let l = left / 1023.0;
    let r = right / 1023.0;

    // Differential drive model
    let linear  = (l + r) / 2.0;
    let angular = (l - r) * 2.0;

    linear *= 800;

    // Update heading
    theta += angular * dt;

    // Compute movement
    let dx = linear * Math.cos(theta) * dt;
    let dy = linear * Math.sin(theta) * dt;

    let prevX = roverX;
    let prevY = roverY;

    roverX += dx * scale;
    roverY += dy * scale;

    // Draw path
    ctx.beginPath();
    ctx.moveTo(prevX, prevY);
    ctx.lineTo(roverX, roverY);

    ctx.strokeStyle = "lime";
    ctx.lineWidth = 2;

    ctx.stroke();

    drawRover();
}

// ================= DRAW ROVER =================

function drawRover()
{
    // Rover body
    ctx.fillStyle = "red";

    ctx.beginPath();
    ctx.arc(roverX, roverY, 5, 0, 2*Math.PI);

    ctx.fill();

    // Heading line
    let hx = roverX + 15*Math.cos(theta);
    let hy = roverY + 15*Math.sin(theta);

    ctx.beginPath();
    ctx.moveTo(roverX, roverY);
    ctx.lineTo(hx, hy);

    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 2;

    ctx.stroke();
}

// ================= RESET MAP =================

function resetMap()
{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    roverX = 250;
    roverY = 250;

    theta = 0;

    ctx.fillStyle = "lime";
    ctx.fillRect(roverX, roverY, 3, 3);
}

// ================= PROCESS JOYSTICK =================

function processJoystick(clientX, clientY)
{
    const rect = container.getBoundingClientRect();

    let x = clientX - rect.left;
    let y = clientY - rect.top;

    let dx = x - centerX;
    let dy = centerY - y;

    // Limit joystick radius
    let distance = Math.sqrt(dx*dx + dy*dy);

    if(distance > maxRadius)
    {
        dx = dx * maxRadius / distance;
        dy = dy * maxRadius / distance;
    }

    moveJoystick(centerX + dx, centerY - dy);

    // Normalize
    let forward = dy / maxRadius;
    let turn = dx / maxRadius;

    // Differential drive mixing
    let leftMotor  = forward + turn;
    let rightMotor = forward - turn;

    // Clamp
    leftMotor = Math.max(-1, Math.min(1, leftMotor));
    rightMotor = Math.max(-1, Math.min(1, rightMotor));

    // Convert to PWM
    leftMotor = parseInt(leftMotor * 1023);
    rightMotor = parseInt(rightMotor * 1023);

    sendMotor(leftMotor, rightMotor);
}

// ================= MOUSE =================

container.addEventListener("mousedown", (e)=>{

    dragging = true;

    processJoystick(e.clientX, e.clientY);
});

document.addEventListener("mousemove", (e)=>{

    if(dragging)
    {
        processJoystick(e.clientX, e.clientY);
    }
});

document.addEventListener("mouseup", ()=>{

    dragging = false;

    moveJoystick(centerX, centerY);

    sendMotor(0,0);
});

// ================= TOUCH =================

container.addEventListener("touchstart", (e)=>{

    dragging = true;

    const touch = e.touches[0];

    processJoystick(touch.clientX, touch.clientY);
});

container.addEventListener("touchmove", (e)=>{

    e.preventDefault();

    if(dragging)
    {
        const touch = e.touches[0];

        processJoystick(touch.clientX, touch.clientY);
    }
});

container.addEventListener("touchend", ()=>{

    dragging = false;

    moveJoystick(centerX, centerY);

    sendMotor(0,0);
});

</script>

</body>
</html>
